<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1c"/>
      <stop offset="100%" stop-color="#05070f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glow circles -->
  <circle cx="1080" cy="120" r="220" fill="rgba(20,184,166,0.06)"/>
  <circle cx="1080" cy="120" r="110" fill="rgba(20,184,166,0.07)"/>
  <circle cx="140" cy="560" r="160" fill="rgba(99,102,241,0.05)"/>

  <!-- Top accent bar -->
  <rect x="80" y="80" width="56" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- Name -->
  <text x="80" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="80" font-weight="700" fill="#f8fafc" letter-spacing="-2">Erik Scheinpflug</text>

  <!-- Role badge -->
  <rect x="80" y="270" width="520" height="52" rx="10" fill="rgba(20,184,166,0.1)" stroke="rgba(20,184,166,0.3)" stroke-width="1"/>
  <text x="100" y="304" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="500" fill="#14b8a6" letter-spacing="0.5">Full-Stack Developer · Next.js · SEO Specialist</text>

  <!-- Description -->
  <text x="80" y="390" font-family="system-ui,-apple-system,sans-serif" font-size="26" fill="#94a3b8">Building fast, SEO-optimised websites and web applications.</text>

  <!-- Divider -->
  <rect x="80" y="465" width="100" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- URL -->
  <text x="80" y="540" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="600" fill="#14b8a6">scheinerik.dev</text>
</svg>
